<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Barber – Choose Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Barlow', sans-serif;
  background: #F0F4F2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px 40px;
}

/* LOGO — colours intact: yellow box, dark green text */
.logo-box {
  background: #F5E030;
  border-radius: 10px;
  padding: 12px 28px;
  text-align: center;
  margin-bottom: 6px;
  display: inline-block;
  box-shadow: 0 4px 16px rgba(0,61,43,0.15);
}
.logo-top {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  color: #003D2B;
  line-height: 1;
  letter-spacing: 2px;
  display: block;
}
.logo-divider {
  background: #003D2B;
  height: 3px;
  margin: 6px -28px;
}
.logo-bottom {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  color: #003D2B;
  line-height: 1;
  letter-spacing: 2px;
  display: block;
}
.tagline {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #5A7A6A;
  text-transform: uppercase;
  margin-top: 14px;
  margin-bottom: 32px;
}

h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: #1A2E25;
  text-align: center;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px;
  color: #7A9A8A;
  text-align: center;
  margin-bottom: 28px;
}

/* PORTAL CARDS */
.portal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  margin-bottom: 16px;
}
.portal-btn {
  background: #ffffff;
  border: 1.5px solid #D8E8DF;
  border-radius: 12px;
  padding: 22px 12px 18px;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  display: block;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,61,43,0.06);
}
.portal-btn:hover {
  background: #EBF5EF;
  border-color: #00C48C;
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,196,140,0.15);
}
.portal-btn:active {
  transform: scale(0.97);
}
.portal-icon {
  font-size: 34px;
  display: block;
  margin-bottom: 10px;
}
.portal-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 900;
  color: #003D2B;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: block;
}
.portal-desc {
  font-size: 11px;
  color: #7A9A8A;
  margin-top: 4px;
  display: block;
}

/* Admin — full-width card */
.portal-btn.admin-btn {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 16px 20px;
  background: #F0EBFF;
  border-color: #C4B0F0;
}
.portal-btn.admin-btn:hover {
  background: #E4D9FF;
  border-color: #7C3AED;
  box-shadow: 0 6px 18px rgba(124,58,237,0.15);
}
.portal-btn.admin-btn .portal-icon {
  font-size: 28px;
  margin: 0;
}
.portal-btn.admin-btn .portal-text {
  text-align: left;
}
.portal-btn.admin-btn .portal-name {
  color: #4C1D95;
}
.portal-btn.admin-btn .portal-desc {
  color: #7C5AC0;
}

.footer-note {
  font-size: 11px;
  color: #9AB5A5;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="logo-box">
  <span class="logo-top">BUDGET</span>
  <div class="logo-divider"></div>
  <span class="logo-bottom">BARBER</span>
</div>
<div class="tagline">Digital Men's Salon</div>

<h1>Choose Your Portal</h1>
<div class="subtitle">Select who you are to continue</div>

<div class="portal-grid">

  <a href="login-customer.html" class="portal-btn">
    <span class="portal-icon">👤</span>
    <span class="portal-name">Customer</span>
    <span class="portal-desc">Style cards & history</span>
  </a>

  <a href="login-barber.html" class="portal-btn">
    <span class="portal-icon">✂️</span>
    <span class="portal-name">Barber</span>
    <span class="portal-desc">Log sales & styles</span>
  </a>

  <a href="login-manager.html" class="portal-btn">
    <span class="portal-icon">🏪</span>
    <span class="portal-name">Manager</span>
    <span class="portal-desc">Dashboard & analytics</span>
  </a>

  <a href="login-franchise.html" class="portal-btn">
    <span class="portal-icon">🏢</span>
    <span class="portal-name">Franchise</span>
    <span class="portal-desc">View-only outlet</span>
  </a>

  <a href="login-admin.html" class="portal-btn admin-btn">
    <span class="portal-icon">🛡️</span>
    <div class="portal-text">
      <span class="portal-name">Admin</span>
      <span class="portal-desc">All salons · Complete control</span>
    </div>
  </a>

</div>

<div class="footer-note">© 2026 Budget Barber · Digital Men's Salon</div>

</script>
</body>
</html>
